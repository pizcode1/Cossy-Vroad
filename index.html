<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cossy Vroad — single file</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #0e1420; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
    #game { width: 100%; height: 100%; display: block; touch-action: none; }
    .hud { position: fixed; inset: 0; pointer-events: none; }
    .score { position: absolute; top: 12px; left: 14px; font-weight: 800; font-size: clamp(24px, 5vw, 42px); text-shadow: 0 4px 12px rgba(0,0,0,.4); }
    .warn { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(214,76,76,.88); border-radius: 999px; padding: 8px 14px; opacity: 0; transition: opacity .2s; font-weight: 700; }
    .warn.show { opacity: 1; }
    .overlay { position: absolute; inset: 0; display: grid; place-content: center; gap: 10px; text-align: center; background: rgba(8,12,20,.56); backdrop-filter: blur(4px); pointer-events: auto; padding: 12px; }
    .overlay.hidden { display: none; }
    .title { margin: 0; font-size: clamp(28px, 6vw, 52px); }
    .sub { margin: 0; color: #d0d7e7; max-width: 640px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    button { border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .primary { background: #4f9dff; color: white; }
    .secondary { background: #2c3f5f; color: white; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div id="score" class="score">0</div>
    <div id="warn" class="warn">БЫСТРЕЕ ВПЕРЁД!</div>
    <div id="overlay" class="overlay">
      <h1 id="title" class="title">Cossy Vroad</h1>
      <p id="subtitle" class="sub">Открывается прямо как 1 HTML файл: просто двойной клик на index.html.</p>
      <div id="chars" class="row"></div>
      <div class="row">
        <button id="startBtn" class="primary">Старт</button>
        <button id="restartBtn" class="secondary" style="display:none">Ещё раз</button>
      </div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const warnEl = document.getElementById('warn');
  const overlay = document.getElementById('overlay');
  const titleEl = document.getElementById('title');
  const subtitleEl = document.getElementById('subtitle');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const charsEl = document.getElementById('chars');

  const CHARACTERS = [
    { id: 'chicken', name: 'Chicken', body: '#ffd455', accent: '#f08a2e', biome: 'default', canBack: false, hopHz: 620, cooldown: 0.12 },
    { id: 'penguin', name: 'Penguin', body: '#f0f6ff', accent: '#2f78ff', biome: 'snow', canBack: true, hopHz: 500, cooldown: 0.1 },
    { id: 'alien', name: 'Alien', body: '#98ff9f', accent: '#6d58ff', biome: 'scifi', canBack: true, hopHz: 710, cooldown: 0.09 },
  ];

  const cfg = {
    lanes: 13,
    rowsAhead: 32,
    rowsKeepBack: 18,
    safeBase: 6,
    rearPushBase: 4.6,
    tileW: 66,
    tileH: 32,
    heightUnit: 19,
  };

  const state = {
    mode: 'start',
    character: CHARACTERS[0],
    playerLane: 0,
    playerRow: 0,
    moveQueue: [],
    moving: false,
    moveT: 0,
    moveDur: 0.12,
    from: { lane: 0, row: 0 },
    to: { lane: 0, row: 0 },
    score: 0,
    maxRow: 0,
    difficulty: 1,
    rearLine: -cfg.rearPushBase,
    rows: new Map(),
    maxGenerated: -1,
    hazards: [],
    spawnTimers: new Map(),
    trainCooldown: new Map(),
    time: 0,
    touchStart: null,
  };

  let audioCtx = null;
  function beep(freq, dur = .08, type = 'square', volume = .04) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(volume, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + dur);
  }

  function rand(a, b) { return Math.random() * (b - a) + a; }
  function randi(a, b) { return Math.floor(rand(a, b + 1)); }
  function chance(p) { return Math.random() < p; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  function biomeColors(biome) {
    if (biome === 'snow') return { sky: '#cdeaff', grass: '#d8efff', road: '#8d93a0', water: '#7dc8ff', rail: '#8c8f96', tree: '#f3fcff' };
    if (biome === 'scifi') return { sky: '#33234f', grass: '#6e58a5', road: '#484457', water: '#30dce5', rail: '#666a79', tree: '#96ffbf' };
    return { sky: '#89c7ff', grass: '#66bb4f', road: '#424242', water: '#3e9eff', rail: '#56585e', tree: '#2e9c45' };
  }

  function resetWorld() {
    state.playerLane = 0;
    state.playerRow = 0;
    state.moveQueue = [];
    state.moving = false;
    state.moveT = 0;
    state.moveDur = state.character.cooldown;
    state.score = 0;
    state.maxRow = 0;
    state.difficulty = 1;
    state.rearLine = -cfg.rearPushBase;
    state.rows.clear();
    state.maxGenerated = -1;
    state.hazards = [];
    state.spawnTimers.clear();
    state.trainCooldown.clear();
    state.time = 0;
    scoreEl.textContent = '0';
    ensureRows(-2, cfg.rowsAhead);
  }

  function pickRowType(idx) {
    if (idx <= 1) return 'grass';
    const d = state.difficulty;
    const railW = Math.min(0.12 + d * 0.01, 0.24);
    const waterW = Math.min(0.16 + d * 0.015, 0.27);
    const roadW = Math.min(0.35 + d * 0.02, 0.5);
    const x = Math.random();
    if (x < railW) return 'rail';
    if (x < railW + waterW) return 'water';
    if (x < railW + waterW + roadW) return 'road';
    return 'grass';
  }

  function generateRow(i) {
    const type = pickRowType(i);
    const safeFreq = Math.max(3, cfg.safeBase - Math.floor(state.difficulty / 2));
    const safe = i <= 0 || i % safeFreq === 0 || (type === 'grass' && chance(0.28));
    const occupancy = Array(cfg.lanes).fill(false);

    if (type === 'grass' && !safe) {
      const trees = randi(1, 4);
      for (let t = 0; t < trees; t++) {
        const free = occupancy.map((v, idx) => [v, idx]).filter(v => !v[0]);
        if (!free.length) break;
        const lane = free[randi(0, free.length - 1)][1];
        occupancy[lane] = true;
      }
    }

    return {
      index: i,
      type,
      safe,
      occupancy,
      dir: chance(0.5) ? 1 : -1,
      speed: rand(1.4, 2.6) + state.difficulty * 0.13,
    };
  }

  function ensureRows(min, max) {
    for (let i = Math.max(min, state.maxGenerated + 1); i <= max; i++) {
      state.rows.set(i, generateRow(i));
      state.maxGenerated = i;
    }
    for (const [idx] of [...state.rows]) {
      if (idx < state.playerRow - cfg.rowsKeepBack) state.rows.delete(idx);
    }
  }

  function enqueue(dx, dz) {
    if (state.mode !== 'playing') return;
    if (state.moveQueue.length < 3) state.moveQueue.push({ dx, dz });
    beep(state.character.hopHz, .07, 'square', .04);
  }

  function startRun() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    state.mode = 'playing';
    overlay.classList.add('hidden');
    resetWorld();
  }

  function die(reason) {
    if (state.mode !== 'playing') return;
    state.mode = 'dead';
    if (reason === 'water') beep(240, .2, 'triangle', .08); else beep(145, .24, 'sawtooth', .09);
    overlay.classList.remove('hidden');
    titleEl.textContent = 'Вы проиграли';
    subtitleEl.textContent = `Счёт: ${state.score}`;
    startBtn.style.display = 'none';
    restartBtn.style.display = '';
  }

  function updatePlayer(dt) {
    if (!state.moving && state.moveQueue.length) {
      const m = state.moveQueue.shift();
      const limit = Math.floor(cfg.lanes / 2);
      const lane = clamp(state.playerLane + m.dx, -limit, limit);
      const row = state.playerRow + m.dz;
      if (lane !== state.playerLane || row !== state.playerRow) {
        state.moving = true;
        state.moveT = 0;
        state.from = { lane: state.playerLane, row: state.playerRow };
        state.to = { lane, row };
        state.playerLane = lane;
        state.playerRow = row;
      }
    }

    if (state.moving) {
      state.moveT += dt;
      if (state.moveT >= state.moveDur) state.moving = false;
    }
  }

  function getVisualPlayer() {
    if (!state.moving) return { lane: state.playerLane, row: state.playerRow, bounce: 0 };
    const t = clamp(state.moveT / state.moveDur, 0, 1);
    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const lane = state.from.lane + (state.to.lane - state.from.lane) * e;
    const row = state.from.row + (state.to.row - state.from.row) * e;
    const bounce = Math.sin(Math.PI * t) * .22;
    return { lane, row, bounce };
  }

  function updateHazards(dt) {
    const rows = [...state.rows.values()];
    for (const row of rows) {
      if (row.safe || row.index < state.playerRow - 2 || row.index > state.playerRow + cfg.rowsAhead) continue;
      const t = (state.spawnTimers.get(row.index) ?? rand(.4, 1.2)) - dt;
      if (t <= 0) {
        if (row.type === 'road') spawnHazard(row, 'vehicle', rand(2.6, 5.6) + state.difficulty * .21, randi(1,2));
        if (row.type === 'water') spawnHazard(row, 'log', rand(1.2, 2.1) + state.difficulty * .1, randi(2,3));
        if (row.type === 'rail') {
          const cd = state.trainCooldown.get(row.index) ?? 0;
          if (cd <= 0) {
            spawnHazard(row, 'train', rand(8, 11) + state.difficulty * .35, randi(4,5));
            state.trainCooldown.set(row.index, randi(3,6));
          } else state.trainCooldown.set(row.index, cd - 1);
        }
        const cool = row.type === 'road' ? rand(.65, 1.4) : rand(1.8, 3.3);
        state.spawnTimers.set(row.index, cool / (1 + state.difficulty * .04));
      } else {
        state.spawnTimers.set(row.index, t);
      }
    }

    const half = Math.floor(cfg.lanes / 2);
    for (const h of state.hazards) {
      if (!h.active) continue;
      h.x += h.dir * h.speed * dt;
      if (Math.abs(h.x) > half + 8 || h.row < state.playerRow - 12) h.active = false;
    }
  }

  function spawnHazard(row, type, speed, length) {
    const half = Math.floor(cfg.lanes / 2);
    const x = row.dir === 1 ? -half - length - 1 : half + length + 1;
    state.hazards.push({ type, row: row.index, x, dir: row.dir, speed, length, active: true });
  }

  function checkCollisions(dt) {
    const p = getVisualPlayer();
    const row = state.rows.get(Math.round(p.row));
    if (!row) return;

    const here = state.hazards.filter(h => h.active && h.row === row.index);
    for (const h of here) {
      const dx = Math.abs(h.x - p.lane);
      if (dx < h.length * 0.5 + .35 && h.type !== 'log') {
        die(h.type === 'train' ? 'train' : 'vehicle');
        return;
      }
    }

    if (row.type === 'water') {
      const log = here.find(h => h.type === 'log' && Math.abs(h.x - p.lane) < h.length * 0.5 + .2);
      if (!log) {
        die('water');
        return;
      }
      state.playerLane = clamp(state.playerLane + log.dir * log.speed * dt, -Math.floor(cfg.lanes / 2), Math.floor(cfg.lanes / 2));
    }
  }

  function worldToScreen(lane, row, camRow) {
    const x = (lane - 0) * cfg.tileW / 2 - (row - camRow) * cfg.tileW / 2;
    const y = (lane - 0) * cfg.tileH / 2 + (row - camRow) * cfg.tileH / 2;
    return { x: canvas.width * 0.5 + x, y: canvas.height * 0.37 + y };
  }

  function shade(hex, amount) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) + amount;
    let g = ((n >> 8) & 255) + amount;
    let b = (n & 255) + amount;
    r = clamp(r, 0, 255); g = clamp(g, 0, 255); b = clamp(b, 0, 255);
    return `rgb(${r|0},${g|0},${b|0})`;
  }

  function drawPrism(cx, cy, w, h, z, color) {
    const topY = cy - z;
    ctx.beginPath();
    ctx.moveTo(cx, topY - h/2); ctx.lineTo(cx + w/2, topY); ctx.lineTo(cx, topY + h/2); ctx.lineTo(cx - w/2, topY); ctx.closePath();
    ctx.fillStyle = shade(color, 24); ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx - w/2, topY); ctx.lineTo(cx, topY + h/2); ctx.lineTo(cx, topY + h/2 + z); ctx.lineTo(cx - w/2, topY + z); ctx.closePath();
    ctx.fillStyle = shade(color, -20); ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx + w/2, topY); ctx.lineTo(cx, topY + h/2); ctx.lineTo(cx, topY + h/2 + z); ctx.lineTo(cx + w/2, topY + z); ctx.closePath();
    ctx.fillStyle = shade(color, -40); ctx.fill();
  }

  function draw() {
    const b = biomeColors(state.character.biome);
    ctx.fillStyle = b.sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const vp = getVisualPlayer();
    const camRow = vp.row - 4.4;

    const rowMin = Math.floor(vp.row - cfg.rowsKeepBack);
    const rowMax = Math.floor(vp.row + cfg.rowsAhead);

    for (let r = rowMax; r >= rowMin; r--) {
      const row = state.rows.get(r);
      if (!row) continue;

      for (let lane = -Math.floor(cfg.lanes/2); lane <= Math.floor(cfg.lanes/2); lane++) {
        const s = worldToScreen(lane, r, camRow);
        let c = b.grass;
        if (row.type === 'road') c = b.road;
        if (row.type === 'water') c = b.water;
        if (row.type === 'rail') c = b.rail;
        drawPrism(s.x, s.y, cfg.tileW, cfg.tileH, cfg.heightUnit, c);

        if (row.type === 'grass' && row.occupancy[lane + Math.floor(cfg.lanes/2)]) {
          const tree = worldToScreen(lane, r, camRow);
          drawPrism(tree.x, tree.y - 20, cfg.tileW*.38, cfg.tileH*.38, cfg.heightUnit*1.1, '#7f5329');
          drawPrism(tree.x, tree.y - 35, cfg.tileW*.58, cfg.tileH*.58, cfg.heightUnit*1.3, b.tree);
        }

        if (row.type === 'road' && lane % 2 === 0) {
          ctx.fillStyle = '#f2de6e';
          ctx.fillRect(s.x - 4, s.y - 2, 8, 4);
        }
      }
    }

    for (const h of state.hazards.filter(h => h.active)) {
      const s = worldToScreen(h.x, h.row, camRow);
      const color = h.type === 'log' ? '#8d5826' : h.type === 'train' ? '#4e5565' : '#d74a38';
      drawPrism(s.x, s.y - 18, cfg.tileW * (0.6 + h.length * .35), cfg.tileH * .68, cfg.heightUnit * (h.type === 'train' ? 2.2 : 1.2), color);
    }

    const ps = worldToScreen(vp.lane, vp.row, camRow);
    drawPrism(ps.x, ps.y - 25 - vp.bounce*16, cfg.tileW*.45, cfg.tileH*.45, cfg.heightUnit*1.4, state.character.body);
    drawPrism(ps.x, ps.y - 32 - vp.bounce*16, cfg.tileW*.18, cfg.tileH*.18, cfg.heightUnit*.6, state.character.accent);

    // rear danger line
    const l = worldToScreen(-Math.floor(cfg.lanes/2)-1, state.rearLine, camRow);
    const r = worldToScreen(Math.floor(cfg.lanes/2)+1, state.rearLine, camRow);
    ctx.strokeStyle = 'rgba(234,88,88,.95)';
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(r.x, r.y); ctx.stroke();
  }

  function tick(ts) {
    if (!tick.last) tick.last = ts;
    const dt = Math.min((ts - tick.last) / 1000, 0.033);
    tick.last = ts;

    if (state.mode === 'playing') {
      state.time += dt;
      updatePlayer(dt);
      if (state.playerRow > state.maxRow) {
        state.maxRow = state.playerRow;
        state.score = state.maxRow;
        scoreEl.textContent = String(state.score);
      }
      state.difficulty = 1 + Math.floor(state.score / 12);
      state.rearLine += dt * (0.42 + state.difficulty * 0.02);
      warnEl.classList.toggle('show', state.playerRow - state.rearLine < 3.2);
      if (state.playerRow < state.rearLine) die('rear');

      ensureRows(state.playerRow - 2, state.playerRow + cfg.rowsAhead);
      updateHazards(dt);
      checkCollisions(dt);
    }

    draw();
    requestAnimationFrame(tick);
  }

  function setCharacter(id) {
    state.character = CHARACTERS.find(c => c.id === id) || CHARACTERS[0];
    if (state.mode !== 'playing') resetWorld();
  }

  function showStart() {
    overlay.classList.remove('hidden');
    titleEl.textContent = 'Cossy Vroad';
    subtitleEl.textContent = 'Открывается сразу из одного файла. Управление: стрелки/WASD и свайпы.';
    startBtn.style.display = '';
    restartBtn.style.display = 'none';
  }

  function setupInput() {
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') enqueue(0, 1);
      if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') enqueue(-1, 0);
      if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') enqueue(1, 0);
      if ((e.key === 'ArrowDown' || e.key.toLowerCase() === 's') && state.character.canBack) enqueue(0, -1);
      if (state.mode !== 'playing' && (e.key === 'Enter' || e.key === ' ')) startRun();
    });

    canvas.addEventListener('pointerdown', (e) => state.touchStart = {x: e.clientX, y: e.clientY});
    canvas.addEventListener('pointerup', (e) => {
      if (!state.touchStart) return;
      const dx = e.clientX - state.touchStart.x;
      const dy = e.clientY - state.touchStart.y;
      if (Math.abs(dx) < 12 && Math.abs(dy) < 12) enqueue(0, 1);
      else if (Math.abs(dx) > Math.abs(dy)) enqueue(dx > 0 ? 1 : -1, 0);
      else if (dy < 0) enqueue(0, 1);
      else if (state.character.canBack) enqueue(0, -1);
      state.touchStart = null;
    });
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function initUI() {
    charsEl.innerHTML = '';
    CHARACTERS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'secondary';
      b.textContent = c.name;
      b.onclick = () => setCharacter(c.id);
      charsEl.appendChild(b);
    });
    startBtn.onclick = startRun;
    restartBtn.onclick = startRun;
  }

  initUI();
  setupInput();
  resize();
  resetWorld();
  showStart();
  requestAnimationFrame(tick);
  addEventListener('resize', resize);
})();
</script>
</body>
</html>
